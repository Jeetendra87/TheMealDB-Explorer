services:
  backend:
    build:
      context: ./backend
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: production
      PORT: 4000
      FRONTEND_URL: http://localhost:8080
      THEMEALDB_API_KEY: 1
      CACHE_DEFAULT_TTL_SECONDS: 300
      CACHE_MAX_ITEMS: 250
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 120

  frontend:
    build:
      context: ./frontend
    ports:
      - '8080:80'
    depends_on:
      - backend
